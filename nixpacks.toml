[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "php82Extensions.gd",
  "php82Extensions.tokenizer",
  "php82Extensions.fileinfo",
  "php82Extensions.openssl",
  "composer",
  "nodejs_20",
  "nodePackages.npm"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci",
  "npm run build"
]

[phases.build]
cmds = [
  "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache",
  "chmod -R 775 storage bootstrap/cache",
  "php artisan optimize:clear"
]

[start]
cmd = "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
